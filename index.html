<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
    <title>My Clean Website</title>
    
    <!-- Base Stylesheet (Points to your custom styles) -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Beautiful GDSherpa Font pulled directly from the source CDN -->
    <style>
        @font-face {
            font-family: 'gdsherpa';
            font-weight: 1 900;
            src: url('https://img6.wsimg.com/ux-assets/@ux/fonts/4.9.0/GDSherpa-vf4.woff2') format('woff2');
            font-display: swap;
        }
    </style>
</head>
<body class="ux-theme-light">

    <!-- Navigation Header -->
    <header style="padding: 20px; border-bottom: 1px solid #D4DBE0; display: flex; justify-content: space-between; align-items: center;">
        <div style="font-family: 'gdsherpa', sans-serif; font-weight: 700; font-size: 1.5rem;">My Brand Logo</div>
        <nav>
            <a href="#about" style="margin-right: 15px; text-decoration: none; color: #111;">About</a>
            <a href="#contact" style="text-decoration: none; color: #111;">Contact</a>
        </nav>
    </header>

    <!-- Main Section Hero Container -->
    <main style="max-width: 1200px; margin: 0 auto; padding: 40px 20px; font-family: 'gdsherpa', sans-serif;">
        <h1 style="font-size: 2.5rem; font-weight: 700; color: #613EA3; margin-bottom: 20px;">
            Welcome to My Independent Site
        </h1>
        <p style="font-size: 1.15rem; line-height: 1.6; color: #444444; max-width: 800px;">
            This layout uses the precise brand colors and premium typography defined by your generator layout, but has been completely scrubbed of external tracking tools, frameworks, and analytics frameworks.
        </p>
        
        <br>
        
        <!-- Premium Action Button Using Layout Colors -->
        <button style="background-color: #613EA3; color: #ffffff; border: none; padding: 12px 24px; font-size: 1rem; border-radius: 4px; cursor: pointer; font-weight: 500;">
            Get Started
        </button>
    </main>

</body>
</html>
